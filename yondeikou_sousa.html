<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読解捜査室　～ネコ警部と新人捜査官～</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap');

  :root {
    --dark:    #1E1747;
    --purple:  #534AB7;
    --light:   #EEEDFE;
    --mid:     #CECBF6;
    --txt:     #26215C;
    --muted:   #6B6880;
    --bg:      #F8F7FF;
    --card:    #FFFFFF;
    --border:  rgba(83,74,183,0.15);
    --g-bg:    #EAF3DE; --g-txt: #27500A; --g-br: #3B6D11;
    --a-bg:    #FAEEDA; --a-txt: #412402; --a-br: #854F0B;
    --r-bg:    #FCEBEB; --r-txt: #501313; --r-br: #A32D2D;
    --tec1: #FF6B6B;
    --tec2: #4ECDC4;
    --tec3: #A8A8A8;
    --tec4: #F7DC6F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

  /* ━━━ ヘッダー ━━━ */
  .hdr {
    background: var(--dark);
    padding: 12px 18px;
    display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 200;
    box-shadow: 0 2px 16px rgba(30,23,71,.4);
  }
  .hdr-ic  { font-size: 22px; }
  .hdr-ttl { color: #fff; font-size: 15px; font-weight: 700; }
  .hdr-sub { color: var(--mid); font-size: 11px; margin-left: auto; }
  .prog-out { height: 3px; background: rgba(83,74,183,.2); }
  .prog-in  { height: 100%; background: var(--purple); transition: width .5s ease; }

  /* ━━━ 単元タブ ━━━ */
  .unit-tabs {
    display: flex; overflow-x: auto; background: var(--dark);
    border-top: 1px solid rgba(255,255,255,.08); scrollbar-width: none;
  }
  .unit-tabs::-webkit-scrollbar { display: none; }
  .unit-tab {
    flex-shrink: 0; padding: 9px 16px; font-size: 12px; font-weight: 700;
    color: rgba(255,255,255,.45); cursor: pointer;
    border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap;
  }
  .unit-tab:hover { color: rgba(255,255,255,.75); }
  .unit-tab.active { color: #fff; border-bottom-color: var(--mid); }
  .unit-tab.done   { color: rgba(255,255,255,.6); border-bottom-color: var(--g-br); }

  /* ━━━ コンテナ ━━━ */
  .wrap { max-width: 700px; margin: 0 auto; padding: 16px 16px 60px; }

  /* ━━━ ステップバー ━━━ */
  .stepbar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
  .sp {
    padding: 3px 9px; border-radius: 999px; font-size: 10px; white-space: nowrap;
    border: 1px solid rgba(83,74,183,.2); color: var(--muted);
  }
  .sp.done   { background: var(--g-bg); color: var(--g-txt); border-color: var(--g-br); }
  .sp.active { background: var(--light); color: var(--txt); border-color: var(--purple); font-weight: 700; }

  /* ━━━ キャラクターバブル ━━━ */
  .nb {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--light); border: 1.5px solid var(--purple);
    border-radius: 16px; padding: 14px 16px; margin-bottom: 16px;
  }
  .nb-face {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--mid); border: 2px solid var(--purple);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .nb-name { font-size: 10px; font-weight: 700; color: var(--purple); letter-spacing: .1em; margin-bottom: 4px; }
  .nb-txt  { font-size: 14px; color: var(--txt); line-height: 1.85; }
  .nb-txt em { font-style: normal; font-weight: 700; color: var(--purple); }

  /* バブル内現場表示 */
  .nb-scene { margin-top: 10px; border-top: 1px dashed rgba(83,74,183,.3); padding-top: 10px; }
  .nb-scene-label { font-size: 9px; font-weight: 700; color: var(--purple); letter-spacing: .1em; margin-bottom: 4px; }
  .nb-scene-text  { font-family: 'Noto Serif JP', serif; font-size: 13px; line-height: 2; color: var(--txt); margin-bottom: 8px; }
  .nb-scene-text mark {
    background: linear-gradient(180deg, transparent 52%, rgba(255,210,0,.75) 52%);
    border-radius: 2px; padding: 0 1px; font-weight: 700; color: inherit;
    animation: markGlow .6s ease;
  }
  mark.qword {
    background: linear-gradient(180deg, transparent 45%, rgba(255,120,120,.55) 45%);
    border-radius: 2px; padding: 0 2px; font-weight: 700; color: #8B0000;
    animation: markGlow .6s ease;
  }
  @keyframes markGlow {
    0%   { background-color: rgba(255,180,0,.0); }
    40%  { background-color: rgba(255,180,0,.5); }
    100% { background-color: transparent; }
  }

  /* ━━━ カード ━━━ */
  .card {
    background: var(--card); border: 0.5px solid var(--border);
    border-radius: 16px; padding: 18px; margin-bottom: 14px;
    box-shadow: 0 1px 6px rgba(83,74,183,.07);
  }
  .badge {
    display: inline-block; background: var(--light); color: var(--purple);
    border: 0.5px solid var(--purple); font-size: 10px; font-weight: 700;
    padding: 2px 9px; border-radius: 999px; margin-bottom: 10px; letter-spacing: .05em;
  }
  .card-ttl  { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .card-hint { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 14px; }

  /* ━━━ ボタン ━━━ */
  .btn {
    display: block; width: 100%; padding: 12px;
    background: var(--purple); color: white;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: opacity .15s; margin-top: 12px;
  }
  .btn:hover { opacity: .88; }

  /* ━━━ チェックアイテム ━━━ */
  .ci {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    border: 0.5px solid rgba(83,74,183,.2);
    cursor: pointer; margin-bottom: 8px; transition: all .15s;
  }
  .ci:hover { background: var(--light); }
  .ci.ck { background: var(--g-bg); border-color: var(--g-br); }
  .cbox {
    width: 22px; height: 22px; border-radius: 6px;
    border: 1.5px solid #ccc; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .ci.ck .cbox { background: var(--g-br); border-color: var(--g-br); color: white; }
  .clabel { font-size: 14px; line-height: 1.6; }

  /* ━━━ 本文ブロック ━━━ */
  .tblock {
    background: #F8F7FF; border: 0.5px solid rgba(83,74,183,.15);
    border-radius: 12px; padding: 14px; margin-bottom: 14px;
    font-family: 'Noto Serif JP', serif; font-size: 14px; line-height: 2.1;
  }
  .para { padding: 8px 10px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; margin-bottom: 10px; transition: all .15s; }
  .para:hover { border-color: rgba(83,74,183,.3); background: white; }
  .para.hl  { border-color: var(--purple); background: var(--light); }
  .plabel   { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 4px; font-family: 'Noto Sans JP', sans-serif; letter-spacing: .05em; }
  mark {
    background: linear-gradient(180deg, transparent 55%, rgba(255,220,0,.65) 55%);
    border-radius: 2px; padding: 0 1px; font-weight: 700; color: inherit;
  }

  /* ━━━ 捜査手帳 ━━━ */
  .memo-opt {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    border: 1.5px solid rgba(83,74,183,.25);
    cursor: pointer; margin-bottom: 7px; font-size: 13px;
    transition: all .15s; line-height: 1.6;
  }
  .memo-opt:hover { background: var(--light); border-color: var(--purple); }
  .memo-opt.sel     { background: var(--light); border-color: var(--purple); }
  .memo-opt.m-ok    { background: var(--g-bg); border-color: var(--g-br); cursor: default; }
  .memo-opt.m-ng    { background: var(--r-bg); border-color: var(--r-br); cursor: default; }
  .memo-onum { font-weight: 700; color: var(--purple); flex-shrink: 0; }
  .hint-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: #FFFDE7; color: #7B6000; border: 1px solid #D4AC0D;
    border-radius: 8px; font-size: 12px; font-weight: 700;
    padding: 5px 12px; cursor: pointer; margin-bottom: 10px;
    font-family: 'Noto Sans JP', sans-serif; transition: opacity .15s;
  }
  .hint-btn:hover { opacity: .82; }
  .hint-note {
    background: #FFFDE7; border-left: 3px solid #D4AC0D;
    border-radius: 0 8px 8px 0; padding: 8px 12px;
    font-size: 12px; color: #5D4200; margin-bottom: 10px; line-height: 1.7;
  }
  .para-quiz { padding: 10px 12px; border-radius: 10px; border: 1.5px solid rgba(83,74,183,.18); margin-bottom: 14px; background: #FAFAFE; }
  .para-text { font-family: 'Noto Serif JP', serif; font-size: 13px; line-height: 2; margin-bottom: 10px; color: var(--dark); }

  /* ━━━ 流し読み ━━━ */
  .skim-para {
    background: #FAFAFE; border: 1.5px solid rgba(83,74,183,.2);
    border-radius: 14px; padding: 16px 16px 14px; margin-bottom: 0;
  }
  .skim-plabel { font-size: 10px; font-weight: 700; color: var(--purple); letter-spacing: .1em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .skim-text { font-family: 'Noto Serif JP', serif; font-size: 14px; line-height: 2.1; color: var(--dark); margin-bottom: 14px; }
  .skim-text mark {
    background: linear-gradient(180deg, transparent 52%, rgba(255,210,0,.75) 52%);
    border-radius: 2px; padding: 0 1px; font-weight: 700; color: inherit;
  }
  .skim-done-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 11px; border-radius: 10px;
    background: var(--dark); color: white; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: opacity .15s;
  }
  .skim-done-btn:hover { opacity: .85; }
  .skim-done-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--g-bg); color: var(--g-txt); border: 1px solid var(--g-br);
    border-radius: 6px; font-size: 11px; font-weight: 700; padding: 2px 8px;
  }
  .skim-progress { display: flex; gap: 5px; margin-bottom: 14px; }
  .skim-dot { height: 4px; flex: 1; border-radius: 2px; background: rgba(83,74,183,.15); transition: background .3s; }
  .skim-dot.done   { background: var(--purple); }
  .skim-dot.active { background: var(--mid); }
  .abc-wrap { display: flex; gap: 8px; margin-top: 12px; }
  .abc-btn {
    flex: 1; padding: 10px 6px; border-radius: 10px; border: 1.5px solid;
    font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all .15s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .abc-a { background: #EAF3DE; color: #27500A; border-color: #3B6D11; }
  .abc-b { background: #FAEEDA; color: #412402; border-color: #854F0B; }
  .abc-c { background: #FCEBEB; color: #501313; border-color: #A32D2D; }
  .abc-a:hover { background: #c8e6b0; }
  .abc-b:hover { background: #f5dbb0; }
  .abc-c:hover { background: #f5c0c0; }
  .abc-a.selected,.abc-b.selected,.abc-c.selected { box-shadow: 0 0 0 3px rgba(83,74,183,.35); }
  .explain-box {
    background: #F0EEFF; border: 1.5px solid var(--purple);
    border-radius: 12px; padding: 13px 14px; margin-top: 12px;
    font-size: 13px; color: var(--txt); line-height: 1.85;
    animation: fadeInUp .25s ease;
  }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .explain-icon { font-size: 16px; margin-right: 4px; }
  .next-para-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 11px; border-radius: 10px; margin-top: 10px;
    background: var(--purple); color: white; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: opacity .15s;
    animation: fadeInUp .25s ease;
  }
  .next-para-btn:hover { opacity: .88; }

  /* ━━━ 解答 ━━━ */
  .qbanner {
    background: var(--dark); color: white; border-radius: 10px;
    padding: 10px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.7;
  }
  .qbanner-lbl { font-size: 10px; color: var(--mid); font-weight: 700; display: block; margin-bottom: 3px; letter-spacing: .08em; }
  .hint-box {
    background: var(--a-bg); border-left: 3px solid var(--a-br);
    padding: 9px 12px; border-radius: 6px; font-size: 13px; color: var(--a-txt); margin-bottom: 12px; line-height: 1.7;
  }
  .aopt {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 12px; border-radius: 10px; border: 1.5px solid rgba(83,74,183,.25);
    cursor: pointer; margin-bottom: 8px; font-size: 14px; transition: all .15s; line-height: 1.6;
  }
  .aopt:hover { background: var(--light); border-color: var(--purple); }
  .aopt.sel { background: var(--light); border-color: var(--purple); }
  .aopt.ok  { background: var(--g-bg); border-color: var(--g-br); cursor: default; }
  .aopt.ng  { background: var(--r-bg); border-color: var(--r-br); cursor: default; }
  .onum { font-weight: 700; color: var(--purple); flex-shrink: 0; }
  .fb { padding: 12px 14px; border-radius: 10px; font-size: 13px; line-height: 1.8; margin-top: 8px; }
  .fb.ok { background: var(--g-bg); color: var(--g-txt); border: 1px solid var(--g-br); }
  .fb.ng { background: var(--r-bg); color: var(--r-txt); border: 1px solid var(--r-br); }

  /* ━━━ 消去法 ━━━ */
  .elim-phase {
    background: #F8F7FF; border: 1px dashed rgba(83,74,183,.3);
    border-radius: 12px; padding: 14px; margin-bottom: 12px;
  }
  .elim-title { font-size: 11px; font-weight: 700; color: var(--purple); letter-spacing: .08em; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
  .elim-opt {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 9px 11px; border-radius: 8px; border: 1px solid rgba(83,74,183,.2);
    margin-bottom: 7px; font-size: 13px; line-height: 1.6;
    cursor: pointer; transition: all .15s; background: white;
  }
  .elim-opt:hover { background: var(--light); border-color: var(--purple); }
  .elim-opt.eliminated { background: #FFF0F0; border-color: #F5A0A0; text-decoration: line-through; color: #999; cursor: default; }
  .elim-opt.kept { background: var(--light); border-color: var(--purple); cursor: default; }
  .elim-comment { font-size: 12px; color: #7B2020; margin-top: 5px; padding: 6px 10px; background: #FFF0F0; border-radius: 6px; line-height: 1.7; animation: fadeInUp .2s ease; }
  .elim-comment.kept-comment { color: var(--txt); background: var(--light); }
  .elim-onum { font-weight: 700; flex-shrink: 0; color: var(--purple); }
  .elim-onum.x { color: #CC4444; }

  /* ━━━ テクニックパネル ━━━ */
  .tech-toggle-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--dark); color: white;
    border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
    padding: 7px 14px; cursor: pointer; margin-bottom: 12px;
    font-family: 'Noto Sans JP', sans-serif; transition: opacity .15s;
  }
  .tech-toggle-btn:hover { opacity: .85; }
  .tech-panel { background: #1a1640; border: 1px solid rgba(206,203,246,.25); border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; animation: fadeInUp .2s ease; }
  .tech-panel-title { font-size: 10px; font-weight: 700; letter-spacing: .12em; color: var(--mid); margin-bottom: 10px; }
  .tech-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; animation: fadeInUp .25s ease both; }
  .tech-item.t1 { background: rgba(255,107,107,.18); }
  .tech-item.t2 { background: rgba(78,205,196,.18); }
  .tech-item.t3 { background: rgba(168,168,168,.18); }
  .tech-item.t4 { background: rgba(247,220,111,.18); }
  .tech-item.tx { background: rgba(130,100,255,.22); }
  .tech-item.ty { background: rgba(50,200,100,.18); }
  .tech-badge { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; color: white; flex-shrink: 0; margin-top: 1px; }
  .b1 { background: #FF6B6B; } .b2 { background: #4ECDC4; }
  .b3 { background: #888; }    .b4 { background: #D4AC0D; }
  .bx { background: #7B52FF; } .by { background: #27AE60; }
  .tech-text { font-size: 12px; color: #E0E0FF; line-height: 1.65; }
  .tech-new-badge { font-size: 9px; background: #FF6B6B; color: white; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }

  /* ━━━ 褒めバナー ━━━ */
  .neko-praise { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 12px; margin-bottom: 12px; animation: fadeInUp .3s ease; }
  .neko-praise.good    { background: #EAF3DE; border: 1px solid #3B6D11; }
  .neko-praise.great   { background: #FFF8E1; border: 1px solid #D4AC0D; }
  .neko-praise.perfect { background: linear-gradient(135deg,#E8F5E9,#FFF8E1); border: 1.5px solid #3B6D11; }
  .neko-praise-icon { font-size: 28px; flex-shrink: 0; }
  .neko-praise-text { font-size: 13px; line-height: 1.8; font-weight: 700; }
  .neko-praise.good .neko-praise-text    { color: #27500A; }
  .neko-praise.great .neko-praise-text   { color: #5D4200; }
  .neko-praise.perfect .neko-praise-text { color: #1B5E20; }

  /* ━━━ 現場フロート ━━━ */
  .float-overlay { position: fixed; inset: 0; background: rgba(30,23,71,.55); z-index: 500; display: flex; align-items: flex-end; justify-content: center; animation: fadeInOv .18s ease; }
  @keyframes fadeInOv { from{opacity:0} to{opacity:1} }
  .float-panel { background: white; border-radius: 20px 20px 0 0; padding: 20px 18px 32px; width: 100%; max-width: 700px; max-height: 70vh; overflow-y: auto; animation: slideUp .22s ease; box-shadow: 0 -4px 30px rgba(30,23,71,.3); }
  @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
  .float-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .float-label { font-size: 11px; font-weight: 700; color: var(--purple); letter-spacing: .08em; }
  .float-close { width: 28px; height: 28px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--purple); }
  .float-body { font-family: 'Noto Serif JP', serif; font-size: 14px; line-height: 2.1; color: var(--dark); background: #F8F7FF; border-radius: 10px; padding: 12px 14px; }
  .scene-btn { display: inline-flex; align-items: center; gap: 5px; background: var(--dark); color: var(--mid); border: none; border-radius: 8px; font-size: 12px; font-weight: 700; padding: 6px 13px; cursor: pointer; margin-bottom: 12px; font-family: 'Noto Sans JP', sans-serif; transition: opacity .15s; }
  .scene-btn:hover { opacity: .82; }

  /* ━━━ スコア・結果 ━━━ */
  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .score-card { background: var(--light); border-radius: 10px; padding: 14px; text-align: center; }
  .score-num  { font-size: 28px; font-weight: 900; color: var(--purple); }
  .score-lbl  { font-size: 11px; color: var(--muted); }
  .rule-box { background: var(--dark); border-radius: 12px; padding: 14px 16px; margin-top: 14px; }
  .rule-ttl  { color: var(--mid); font-size: 11px; font-weight: 700; margin-bottom: 8px; letter-spacing: .08em; }
  .rule-item { color: white; font-size: 13px; line-height: 2.1; }

  /* ━━━ はじめにページ ━━━ */
  .preface-wrap { background: var(--card); border: 0.5px solid var(--border); border-radius: 20px; padding: 26px 22px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(83,74,183,.08); }
  .preface-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: .18em; color: var(--purple); margin-bottom: 12px; }
  .preface-title { font-size: 19px; font-weight: 900; color: var(--dark); line-height: 1.55; margin-bottom: 16px; }
  .preface-title span { color: var(--purple); }
  .preface-body { font-size: 14px; line-height: 2; color: #3a3660; margin-bottom: 20px; }
  .preface-body p { margin-bottom: 12px; }

function getS()   { return unitStates[currentUnit]; }
function getT()   { return UNITS[currentUnit]; }
function getQS()  { return UNITS[currentUnit].qs; }

function addKeywordMark(html, keyword){
  if(!keyword) return html;
  const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return html.replace(new RegExp('('+escaped+')','g'), '<mark class="qword">$1</mark>');
}

function pct(){
  if(currentUnit < 0) return 0;
  const S = getS();
  return Math.round((S.step / (STEPS_LABELS.length - 1)) * 100);
}

  let sceneBlock = '';
  if(sceneParaId && currentUnit >= 0){
    const TEXT = getT();
    const paras = sceneParaId === 'all' ? TEXT.paras : TEXT.paras.filter(p=>p.id===sceneParaId);
    if(paras.length > 0){
      sceneBlock = '<div class="nb-scene">' +
        paras.map(p=>{
          const body = keyword ? addKeywordMark(p.highlighted, keyword) : p.highlighted;
          return `<div class="nb-scene-label">${p.label}</div><div class="nb-scene-text">${body}</div>`;
        }).join('') + '</div>';

════════════════════════════════════════ */
function renderTabs(){
  const tabs = document.getElementById('unitTabs');
  let h = `<div class="unit-tab${currentUnit===-1?' active':''}" onclick="switchUnit(-1)">📖 はじめに</div>`;
  UNITS.forEach((u,i)=>{
    const S = unitStates[i];
    const done = S.step >= STEPS_LABELS.length - 1;
    const active = currentUnit === i;
    h += `<div class="unit-tab${active?' active':done?' done':''}" onclick="switchUnit(${i})">${u.label}</div>`;
  });
  tabs.innerHTML = h;
}

function switchUnit(idx){
  currentUnit = idx;
  renderTabs();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

      h += `<div class="hint-popup-overlay" onclick="closeHintPopup(event)">
        <div class="hint-popup">
          <div class="hint-popup-header">
            <div class="hint-popup-title">💡 ネコ警部のヒント</div>
            <button class="hint-popup-close" onclick="toggleHintPopup()">✕</button>
          </div>
          <div class="hint-popup-body">${q.clue}</div>
          <div class="hint-popup-tec">
            テクニック1「つまり・だから」→ 要点の直後<br>
            テクニック2「しかし・ところが」→ 逆転後が本音<br>
            テクニック3「たとえば」→ 要点はない（例のみ）<br>
            テクニック4「これ・それ」→ 直前に答えがある
          </div>
        </div>
      </div>`;
    }

    // ── ネコ警部バブル
    if(!elimDone){
      h += nbHTML('🐱', 'よし、<strong>消去法</strong>で絞っていこう。「これってここがおかしくない？」って感じた選択肢を消していくの。');
    } else if(!isDone){
      h += nbHTML('🐾', '消去できたね。では、残った選択肢——<strong>でも、よく現場を見てみて！</strong>　確信を持って選んでみよう。');
    } else {
      const ok = S.selA[qi] === q.ans;
      h += nbHTML(ok?'🐱':'🐾', ok ? q.neko_ok : q.neko_ng);
    }

    // ── 本文スライダー（上部・常時表示）
    h += `<div class="text-slider-wrap">
      <div class="text-slider-header">
        <span class="text-slider-label">📄 本文を確認する</span>
        <div class="text-slider-nav">
          <button class="tsnav-btn" onclick="sliderPrev()" ${sp===0?'disabled':''}>◀</button>
          <span class="tsnav-cur">${sp+1} / ${totalParas}</span>
          <button class="tsnav-btn" onclick="sliderNext()" ${sp===totalParas-1?'disabled':''}>▶</button>
        </div>
      </div>
      <div class="text-slider-body">
        <div class="text-slider-plabel">${curPara.label}</div>
        ${q.keyword ? addKeywordMark(curPara.highlighted, q.keyword) : curPara.highlighted}
      </div>
    </div>`;

    // ── 問題カード（固定）
    h += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="badge" style="margin-bottom:0">問${qi+1} / ${QS.length}</div>
        <div style="font-size:12px;color:var(--muted)">消去済み：${S.elimShown[qi].length}個</div>
      </div>
      <div class="qbanner"><span class="qbanner-lbl">この問いは！</span>${q.q}</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <button class="hint-open-btn" onclick="toggleHintPopup()">💡 ヒントを見る</button>
        <button class="tech-toggle-btn" onclick="toggleTech()">⚔️ ${S.showTech ? '武器を閉じる' : '武器（テクニック）'}</button>
      </div>
      ${S.showTech ? techPanelHTML(qi) : ''}`;

    if(!isDone){
      h += `<div class="elim-phase">
        <div class="elim-title">🗑️ 消去法　— おかしいと思う選択肢を２つ消してみよう</div>`;
      q.opts.forEach((opt,oi)=>{
        const shown = S.elimShown[qi].includes(oi);
        const comment = q.elim[oi];
        let cls = 'elim-opt';
        if(shown && comment) cls += ' eliminated';
        else if(shown && !comment) cls += ' kept';
        const numCls = shown && comment ? 'elim-onum x' : 'elim-onum';
        const onclick = (!elimDone && !shown) ? `onclick="elimTap(${qi},${oi})"` : '';
        h += `<div class="${cls}" ${onclick}>
          <span class="${numCls}">${['①','②','③','④'][oi]}</span>
          <span>${opt}</span>
        </div>`;
        if(shown){
          const cmtCls = comment ? 'elim-comment' : 'elim-comment kept-comment';
          const cmtTxt = comment
            ? '🐱 ' + comment + '　<strong>→ じゃ、これはないよね。</strong>'
            : '🐱 これ……本文と合ってそうだよね。残しておこう。';
          h += `<div class="${cmtCls}">${cmtTxt}</div>`;
        }
      });
      const wrongsShown = q.elim.filter((e,i)=>e!==null && S.elimShown[qi].includes(i)).length;
      const totalWrongs = q.elim.filter(e=>e!==null).length;
      if(!elimDone){
        h += `<div style="font-size:12px;color:var(--muted);text-align:center;margin-top:8px">おかしいと思う選択肢を２つ消してみよう（${wrongsShown} / 2 消去済み）</div>`;
        if(wrongsShown === totalWrongs){
          h += `<button class="btn" style="margin-top:10px" onclick="elimFinish(${qi})">２つ消した！　残りから選ぶ →</button>`;
        }
      }
      h += `</div>`;

      if(elimDone){
        h += `<div class="nb" style="margin-bottom:12px">
          <div class="nb-face" style="font-size:20px">🐱</div>
          <div style="flex:1">
            <div class="nb-name">🐱 ネコ警部</div>
            <div class="nb-txt">どっちも合っているように見えるかもしれないよ。<br>でも——<em>もう一度問題文をよく読んでみて。</em><br>「訊いているのは何か」をよく考えてから選んでみよう。</div>
          </div>
        </div>`;
        q.opts.forEach((opt,oi)=>{
          if(q.elim[oi]) return;
          let cls = 'aopt';
          if(S.selA[qi] === oi) cls += ' sel';
          h += `<div class="${cls}" onclick="selAns(${qi},${oi})"><span class="onum">${['①','②','③','④'][oi]}</span><span>${opt}</span></div>`;
        });
        if(S.selA[qi] >= 0){
          h += `<button class="btn" style="margin-top:10px" onclick="confAns(${qi})">答えを確認する</button>`;
        }
      }

    } else {
      const ok = S.selA[qi] === q.ans;
      // 褒めバナー
      const praiseStage = qi===0?'good':qi===1?'great':'perfect';
      const praiseLines = qi===2
        ? ['🏆','私が教えることはもうないかも——ここまでよく積み上げてきたよ！']
        : qi===1
        ? ['⭐','やるな！　消去法、使いこなしてきてるじゃないか。']
        : ['👏', ok?'いいね！　最初の問題、しっかり解けたよ。':'惜しかったけど、消去の考え方はよかったよ。'];
      h += `<div class="neko-praise ${praiseStage}">
        <div class="neko-praise-icon">${praiseLines[0]}</div>
        <div class="neko-praise-text">${praiseLines[1]}</div>
      </div>`;

      q.opts.forEach((opt,oi)=>{
        let cls = 'aopt';
        cls += oi===q.ans?' ok':(S.selA[qi]===oi?' ng':'');
        h += `<div class="${cls}" style="cursor:default"><span class="onum">${['①','②','③','④'][oi]}</span><span>${opt}</span></div>`;
      });
      h += `<div class="fb ${ok?'ok':'ng'}">${ok?q.ok:q.ng}</div>`;

      if(qi===1 && ok){
        h += `<div class="explain-box" style="background:#E8F5E9;border-color:#27AE60;margin-top:10px">
          <span class="explain-icon">🐱</span><strong>新しい武器が解放されたよ！</strong><br>
          「最も適当なものを選べ」では、複数の選択肢がなんとなく合ってそうに見えることがある。<br>
          そのときは——<strong style="color:#1B5E20">より正確で、より本文に近いもの</strong>を選んでみよう。
        </div>`;
      }

      if(qi < QS.length-1){
        h += `<button class="btn" style="margin-top:10px" onclick="nextQ()">次の問題へ（問${qi+2}）→</button>`;
      } else {
        h += `<button class="btn" style="margin-top:10px" onclick="adv()">🐱 結果を確認する →</button>`;
      }
    }
    h += `</div>`;

    }else if(sid==='done'){
    const p2 = Math.round((S.score / QS.length) * 100);
    const icon = p2===100?'🏆':p2>=66?'🔍':'📝';
    const msg = p2===100
      ? '<em>私が教えることはもうないかも——ここまでよく積み上げてきたよ。本当にすごいぞ！</em>'
      : p2>=66
      ? '<em>いいぞ。消去法、使いこなしてきてるじゃないか。次はもっとできるよ。</em>'
      : '<em>まだ難しいかもね。でも、今日の訓練は絶対に活きてくる。一緒にもう一回やってみよう。</em>';
    h += nbHTML(icon, msg);
    h += `<div class="card">
      <div class="badge">🐱 ネコ警部の捜査報告書</div>
      <div class="score-grid">
        <div class="score-card"><div class="score-num">${S.score}/${QS.length}</div><div class="score-lbl">正解数</div></div>
        <div class="score-card"><div class="score-num">${p2}%</div><div class="score-lbl">正答率</div></div>
      </div>
      <div class="rule-box">
        <div class="rule-ttl">🐱 ネコ警部の一言まとめ</div>
        <div class="rule-item">
          テクニック1「つまり・だから・要するに」→ <strong style="color:var(--mid)">要点（動機）がある</strong><br>
          テクニック2「しかし・だが・一方で」→ <strong style="color:var(--mid)">犯人の本音が出る</strong><br>
          テクニック3「たとえば」→ <strong style="color:var(--mid)">要点はない（例だけ）</strong><br>
          テクニック4「これ・それ・この・その」→ <strong style="color:var(--mid)">直前に答えがある</strong>
        </div>
      </div>
      <button class="btn" style="margin-top:12px" onclick="restartUnit()">🐱 もう一回、一緒にやってみる</button>
      ${currentUnit < UNITS.length-1 ? `<button class="btn" style="margin-top:8px;background:var(--dark)" onclick="switchUnit(${currentUnit+1})">次の事件へ → ${UNITS[currentUnit+1].label}</button>` : ''}
    </div>`;
  }

  app.innerHTML = h;
}

/* ════════════════════════════════════════
   はじめに・単元イントロ
════════════════════════════════════════ */
function renderPreface(){
  return `<div class="preface-wrap">
    <div class="preface-eyebrow">READ ME FIRST　/　このプログラムについて</div>
    <div class="preface-title">国語の正答率を上げる<br><span>読解捜査トレーニング</span></div>
    <div class="preface-body">
      <p>このプログラムは、<strong>国語の正答率を上げるための訓練</strong>を目的として作られました。読解問題に取り組むときの「見方・考え方」を、繰り返しの練習を通じて身につけていくものです。</p>
      <p>ここで紹介する方法が「すべての問題に通じる万能の解法」というわけではありません。国語という教科が持つ深さ・豊かさはこれだけではなく、文章を読む楽しさや言葉のすばらしさは、もっとずっと広いところにあります。</p>
    </div>
    <div class="preface-note">
      <strong>制作者より</strong><br>
      国語を「犯罪捜査」にたとえることで、読解の手がかりを見つけやすくしています。このたとえを使った段階で、日本語の持つ豊かさや、文学が本来そなえているすばらしさを、少なからず損なっている点があることを、あらかじめご了承ください。
    </div>
    <div class="preface-cast">
      <div class="cast-card">
        <div class="cast-icon">🐱</div>
        <div class="cast-name">ネコ警部</div>
        <div class="cast-role">ベテラン捜査官（案内役）</div>
        <div class="cast-desc">読解のコツを知り尽くした若いベテラン。やさしく、でも捜査はきちんとこなす。</div>
      </div>
      <div class="cast-card">
        <div class="cast-icon">🔰</div>
        <div class="cast-name">あなた</div>
        <div class="cast-role">新人捜査官</div>
        <div class="cast-desc">ネコ警部と一緒に訓練を重ね、少しずつ成長していく。それがあなたのストーリー。</div>
      </div>
    </div>
    <div style="font-size:14px;font-weight:700;color:var(--dark);margin-bottom:12px">📋 ４つの事件</div>
    ${UNITS.map((u,i)=>`<div class="s3card" style="cursor:pointer" onclick="switchUnit(${i})">
      <div class="s3icon" style="font-size:20px">${u.label.slice(0,2)}</div>
      <div>
        <div class="s3ttl">${u.label}</div>
        <div class="s3sub">${u.title}</div>
        <div class="s3meta">${unitStates[i].step >= STEPS_LABELS.length-1 ? '✅ 捜査完了' : unitStates[i].step > 0 ? '🔍 捜査中' : '📁 未着手'}</div>
      </div>
    </div>`).join('')}
    <button class="btn" onclick="switchUnit(0)">🐱 さあ、第１事件へ →</button>
  </div>`;
}

function renderUnitIntro(TEXT){
  return `<div class="preface-wrap">
    <div class="preface-eyebrow">新しい事件ファイル</div>
    <div class="preface-title">${UNITS[currentUnit].label}<br><span>${TEXT.title}</span></div>
    <div class="preface-body">
      <p>この事件では、<strong>「${TEXT.title}」</strong>について書かれた文章を捜査する。</p>
      <p>ネコ警部と一緒に、10のステップで証拠を集めていこう。消去法をうまく使えば、答えは必ず見えてくるよ。</p>
    </div>
    <div class="preface-cast">
      <div class="cast-card">
        <div class="cast-icon">🐱</div>
        <div class="cast-name">ネコ警部</div>
        <div class="cast-role">ベテラン捜査官</div>
        <div class="cast-desc">この事件も一緒に捜査するよ。</div>
      </div>
      <div class="cast-card">
        <div class="cast-icon">📄</div>
        <div class="cast-name">段落数</div>
        <div class="cast-role">${TEXT.paras.length}段落</div>
        <div class="cast-desc">問題は3問。消去法で絞っていこう。</div>
      </div>
    </div>
    <button class="btn" onclick="adv()">🐱 捜査開始！ →</button>
  </div>`;
}

/* ════════════════════════════════════════
   イベントハンドラ
════════════════════════════════════════ */
function tog(k){ const S=getS(); S.checks[k]=!S.checks[k]; render(); }
function togHl(id){ const S=getS(); S.hl[id]=!S.hl[id]; render(); }
function adv(){ getS().step++; render(); }
function selAns(qi,oi){ getS().selA[qi]=oi; render(); }
function confAns(qi){
  const S=getS(); S.answered[qi]=true;
  if(S.selA[qi]===getQS()[qi].ans) S.score++;
  render();
}
function nextQ(){ const S=getS(); S.qIdx++; S.showFloat=false; S.sliderPage=0; S.showHintPopup=false; render(); }
function elimTap(qi,oi){
  const S=getS();
  if(S.elimDone[qi]) return;
  if(!S.elimShown[qi].includes(oi)) S.elimShown[qi]=[...S.elimShown[qi],oi];
  render();
}
function elimFinish(qi){ getS().elimDone[qi]=true; render(); }
function memoSel(id,oi){ const S=getS(); if(!S.memoConfirmed[id]){ S.memoSel[id]=oi; render(); } }
function memoHint(id){ const S=getS(); S.memoHint[id]=!S.memoHint[id]; render(); }
function memoConfirm(id){ const S=getS(); if(S.memoSel[id]!==undefined&&S.memoSel[id]>=0){ S.memoConfirmed[id]=true; render(); } }
function skimMarkRead(id){ const S=getS(); S.skimRead[id]=true; render(); }
function skimSetABC(id,val){ const S=getS(); S.skimABC[id]=val; render(); }
function skimFinish(){ adv(); }
function skimNext(){
  const S=getS(); const T=getT();
  if(S.skimPage < T.paras.length-1){ S.skimPage++; render(); }
  else{ adv(); }
}
function toggleFloat(){ const S=getS(); S.showFloat=!S.showFloat; render(); }
function toggleTech(){ const S=getS(); S.showTech=!S.showTech; render(); }
function closeFloat(e){ if(e.target.classList.contains('float-overlay')){ getS().showFloat=false; render(); } }
function restartUnit(){
  unitStates[currentUnit]=makeUnitState();
  render();
}
function markOpen(idx){ const S=getS(); S.markOpen[idx]=true; render(); }
function markNext(){
  const S=getS(); const T=getT();
  if(S.markPage < T.paras.length-1){ S.markPage++; render(); }
}
function sliderPrev(){
  const S=getS(); const T=getT();
  if(S.sliderPage > 0){ S.sliderPage--; render(); }
}
function sliderNext(){
  const S=getS(); const T=getT();
  if(S.sliderPage < T.paras.length-1){ S.sliderPage++; render(); }
}
function toggleHintPopup(){
  const S=getS(); S.showHintPopup=!S.showHintPopup; render();
}
function closeHintPopup(e){
  if(e.target.classList.contains('hint-popup-overlay')){ getS().showHintPopup=false; render(); }
}

/* ════════════════════════════════════════
   起動
════════════════════════════════════════ */
renderTabs();
render();
</script>
</body>
